<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ParkVision{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.svg') }}">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="ParkVision" height="48" class="me-2">
                ParkVision
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/condominios"><i class="bi bi-building me-1"></i>Condomínios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sobre"><i class="bi bi-info-circle me-1"></i>Sobre</a>
                    </li>
                </ul>
                
                <!-- Menu do usuário -->
                <ul class="navbar-nav" id="user-menu">
                    <!-- Será preenchido via JavaScript -->
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container my-4">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">© 2025 ParkVision - Monitoramento de Condomínios em Tempo Real</span>
        </div>
    </footer>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Sistema de autenticação global -->
    <script>
    $(document).ready(function() {
        // Verificar status de autenticação ao carregar a página
        verificarStatusAuth();
    });

    function verificarStatusAuth() {
        $.ajax({
            url: '/api/auth/status',
            method: 'GET',
            success: function(response) {
                if (response.authenticated && response.usuario) {
                    mostrarMenuUsuario(response.usuario);
                } else {
                    mostrarMenuLogin();
                }
            },
            error: function() {
                mostrarMenuLogin();
            }
        });
    }

    function mostrarMenuUsuario(usuario) {
        const menuHtml = `
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>${usuario.nome_curto}
                    <span class="badge bg-light text-dark ms-1">${usuario.tipo_usuario}</span>
                </a>
                <ul class="dropdown-menu">
                    <li><h6 class="dropdown-header">${usuario.nome_curto}</h6></li>
                    <li><hr class="dropdown-divider"></li>
                    ${usuario.tipo_usuario === 'ADM' ? `
                    <li><a class="dropdown-item" href="/admin/usuarios">
                        <i class="bi bi-people me-2"></i>Gestão de Usuários
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    ` : ''}
                    <li><a class="dropdown-item" href="/alterar-senha">
                        <i class="bi bi-shield-lock me-2"></i>Alterar Senha
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="logout()">
                        <i class="bi bi-box-arrow-right me-2"></i>Sair
                    </a></li>
                </ul>
            </li>
        `;
        $('#user-menu').html(menuHtml);
    }

    function mostrarMenuLogin() {
        const menuHtml = `
            <li class="nav-item">
                <a class="nav-link" href="/login">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                </a>
            </li>
        `;
        $('#user-menu').html(menuHtml);
    }

    function logout() {
        $.ajax({
            url: '/api/auth/logout',
            method: 'POST',
            success: function(response) {
                if (response.success) {
                    window.location.href = '/login';
                }
            },
            error: function() {
                // Mesmo com erro, redirecionar para login
                window.location.href = '/login';
            }
        });
    }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
