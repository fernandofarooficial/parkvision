<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ParkVision{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.svg') }}">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="ParkVision" height="88" class="me-2">
                ParkVision
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/condominios"><i class="bi bi-building me-1"></i>Condomínios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sobre"><i class="bi bi-info-circle me-1"></i>Sobre</a>
                    </li>
                </ul>
                
                <!-- Menu do usuário -->
                <ul class="navbar-nav" id="user-menu">
                    <!-- Será preenchido via JavaScript -->
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container my-4">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">© 2025 ParkVision - Monitoramento de Condomínios em Tempo Real</span>
        </div>
    </footer>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Sistema de autenticação global -->
    <script>
    $(document).ready(function() {
        // Verificar status de autenticação ao carregar a página
        verificarStatusAuth();
    });

    function verificarStatusAuth() {
        $.ajax({
            url: '/api/auth/status',
            method: 'GET',
            success: function(response) {
                if (response.authenticated && response.usuario) {
                    mostrarMenuUsuario(response.usuario);
                } else {
                    mostrarMenuLogin();
                }
            },
            error: function() {
                mostrarMenuLogin();
            }
        });
    }

    function mostrarMenuUsuario(usuario) {
        const menuHtml = `
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>${usuario.nome_curto}
                    <span class="badge bg-light text-dark ms-1">${usuario.tipo_usuario}</span>
                </a>
                <ul class="dropdown-menu">
                    <li><h6 class="dropdown-header">${usuario.nome_curto}</h6></li>
                    <li><hr class="dropdown-divider"></li>
                    ${usuario.tipo_usuario === 'ADM' ? `
                    <li><a class="dropdown-item" href="/admin/usuarios">
                        <i class="bi bi-people me-2"></i>Gestão de Usuários
                    </a></li>
                    <li><a class="dropdown-item" href="/logs">
                        <i class="bi bi-journal-text me-2"></i>Logs do Sistema
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    ` : ''}
                    <li><a class="dropdown-item" href="/alterar-senha">
                        <i class="bi bi-shield-lock me-2"></i>Alterar Senha
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="logout()">
                        <i class="bi bi-box-arrow-right me-2"></i>Sair
                    </a></li>
                </ul>
            </li>
        `;
        $('#user-menu').html(menuHtml);
    }

    function mostrarMenuLogin() {
        const menuHtml = `
            <li class="nav-item">
                <a class="nav-link" href="/login">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                </a>
            </li>
        `;
        $('#user-menu').html(menuHtml);
    }

    function logout() {
        $.ajax({
            url: '/api/auth/logout',
            method: 'POST',
            success: function(response) {
                if (response.success) {
                    window.location.href = '/login';
                }
            },
            error: function() {
                // Mesmo com erro, redirecionar para login
                window.location.href = '/login';
            }
        });
    }
    </script>
    
    <!-- ── Modal: Escolher Placa para Consulta ───────────────────────────── -->
    <div class="modal fade" id="modalEscolherPlacaConsulta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-search me-2"></i>Consultar Veículo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label fw-semibold">Informe a placa</label>
                    <input type="text" class="form-control text-uppercase fw-bold"
                           id="input-placa-consulta" maxlength="8"
                           placeholder="Ex: ABC1D23" autocomplete="off">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-info text-white" id="btn-confirmar-placa-consulta">
                        <i class="bi bi-search me-1"></i>Consultar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Modal: Quadro de Consulta de Veículo ──────────────────────────── -->
    <div class="modal fade" id="modalConsultaVeiculo" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-car-front me-2"></i>Consulta de Veículo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Dados cadastrais -->
                    <div class="row g-2 mb-3">
                        <div class="col-6 col-md-3">
                            <div class="border rounded text-center p-2">
                                <div class="text-muted small">Placa</div>
                                <div class="fw-bold fs-5" id="cv-placa">—</div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="border rounded text-center p-2">
                                <div class="text-muted small">Marca</div>
                                <div class="fw-semibold" id="cv-marca">—</div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="border rounded text-center p-2">
                                <div class="text-muted small">Modelo</div>
                                <div class="fw-semibold" id="cv-modelo">—</div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="border rounded text-center p-2">
                                <div class="text-muted small">Cor</div>
                                <div class="fw-semibold" id="cv-cor">—</div>
                            </div>
                        </div>
                    </div>
                    <!-- Permissões -->
                    <div id="cv-body">
                        <div class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-info me-2"></div>
                            Carregando...
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ── Consulta de Veículo ──────────────────────────────────────────────────
    function abrirEscolherPlacaConsulta() {
        const el = document.getElementById('modalEscolherPlacaConsulta');
        if (!el) return;
        const input = document.getElementById('input-placa-consulta');
        input.value = '';
        (bootstrap.Modal.getInstance(el) || new bootstrap.Modal(el)).show();
        setTimeout(() => input.focus(), 350);
    }

    function abrirConsultaVeiculo(placa) {
        const el = document.getElementById('modalConsultaVeiculo');
        if (!el) return;
        placa = (placa || '').toUpperCase().trim();

        ['cv-placa','cv-marca','cv-modelo','cv-cor'].forEach(function(id) {
            document.getElementById(id).textContent = '...';
        });
        document.getElementById('cv-body').innerHTML =
            '<div class="text-center py-3">' +
            '<div class="spinner-border spinner-border-sm text-info me-2"></div>Carregando...</div>';

        (bootstrap.Modal.getInstance(el) || new bootstrap.Modal(el)).show();

        fetch('/api/consulta-veiculo/' + encodeURIComponent(placa))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.success) {
                    document.getElementById('cv-placa').textContent  = placa;
                    document.getElementById('cv-marca').textContent  = '—';
                    document.getElementById('cv-modelo').textContent = '—';
                    document.getElementById('cv-cor').textContent    = '—';
                    document.getElementById('cv-body').innerHTML =
                        '<div class="alert alert-warning mb-0"><i class="bi bi-exclamation-triangle me-2"></i>' +
                        (data.message || 'Veículo não encontrado') + '</div>';
                    return;
                }
                var v = data.data.veiculo;
                document.getElementById('cv-placa').textContent  = v.placa;
                document.getElementById('cv-marca').textContent  = v.marca;
                document.getElementById('cv-modelo').textContent = v.modelo;
                document.getElementById('cv-cor').textContent    = v.cor;

                var perms = data.data.permissoes;
                if (!perms || perms.length === 0) {
                    document.getElementById('cv-body').innerHTML =
                        '<p class="text-muted text-center mb-0">Nenhuma permissão cadastrada para este veículo.</p>';
                    return;
                }
                var badgeMap = {
                    'VIGENTE':   'bg-success',
                    'INDEFINIDA':'bg-primary',
                    'FUTURA':    'bg-warning text-dark',
                    'VENCIDA':   'bg-secondary',
                };
                var html = '<h6 class="mb-2"><i class="bi bi-shield-check me-1"></i>Permissões (' +
                           perms.length + ')</h6>' +
                           '<div class="table-responsive">' +
                           '<table class="table table-sm table-bordered mb-0">' +
                           '<thead class="table-dark"><tr>' +
                           '<th>Condomínio</th><th>Unidade</th>' +
                           '<th>Início</th><th>Fim</th><th>Status</th>' +
                           '</tr></thead><tbody>';
                perms.forEach(function(p) {
                    var cls = badgeMap[p.status] || 'bg-secondary';
                    html += '<tr>' +
                            '<td>' + p.condominio + '</td>' +
                            '<td>' + p.unidade    + '</td>' +
                            '<td>' + p.data_inicio + '</td>' +
                            '<td>' + p.data_fim    + '</td>' +
                            '<td><span class="badge ' + cls + '">' + p.status + '</span></td>' +
                            '</tr>';
                });
                html += '</tbody></table></div>';
                document.getElementById('cv-body').innerHTML = html;
            })
            .catch(function() {
                document.getElementById('cv-body').innerHTML =
                    '<div class="alert alert-danger mb-0">Erro de conexão ao consultar veículo.</div>';
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btnConf  = document.getElementById('btn-confirmar-placa-consulta');
        var inputPlaca = document.getElementById('input-placa-consulta');
        if (btnConf) {
            btnConf.addEventListener('click', function() {
                var placa = (inputPlaca.value || '').trim().toUpperCase();
                if (!placa) { inputPlaca.focus(); return; }
                var pickerInst = bootstrap.Modal.getInstance(
                    document.getElementById('modalEscolherPlacaConsulta'));
                if (pickerInst) pickerInst.hide();
                setTimeout(function() { abrirConsultaVeiculo(placa); }, 300);
            });
        }
        if (inputPlaca) {
            inputPlaca.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') btnConf && btnConf.click();
            });
            inputPlaca.addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
        }
    });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
