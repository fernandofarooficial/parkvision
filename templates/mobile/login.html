<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a3a5c">
    <title>ParkVision</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a3a5c;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-area img {
            width: 120px;
            height: 120px;
        }
        .logo-area h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .logo-area h1 span { color: #00c2e0; }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }

        .card h2 {
            font-size: 18px;
            color: #1a3a5c;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }

        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            color: #222;
            outline: none;
            transition: border-color 0.2s;
            background: #f8f9fa;
        }
        .field input:focus {
            border-color: #00c2e0;
            background: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #1a3a5c;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-login:active { background: #00c2e0; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .erro {
            background: #fff0f0;
            border: 1px solid #f5c6cb;
            border-radius: 10px;
            color: #721c24;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 16px;
            text-align: center;
            display: none;
        }
        .erro.visivel { display: block; }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo-area">
        <img src="/static/icons/icon-square.svg" alt="ParkVision">
        <h1>Park<span>Vision</span></h1>
    </div>

    <div class="card">
        <h2>Entrar</h2>
        <div class="erro" id="erro">{{ erro or '' }}</div>
        <form id="form-login">
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com"
                       autocomplete="username" inputmode="email" required>
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btn">
                <span class="spinner" id="spinner"></span>
                Entrar
            </button>
        </form>
    </div>

    <script>
        {% if erro %}
        document.getElementById('erro').classList.add('visivel');
        document.getElementById('erro').textContent = '{{ erro }}';
        {% endif %}

        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const spinner = document.getElementById('spinner');
            const erroEl = document.getElementById('erro');

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            erroEl.classList.remove('visivel');

            const res = await fetch('/app/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    senha: document.getElementById('senha').value
                })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = '/app/condominio';
            } else {
                erroEl.textContent = data.message || 'Credenciais inválidas.';
                erroEl.classList.add('visivel');
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
