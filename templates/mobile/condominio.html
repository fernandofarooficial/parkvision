<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a3a5c">
    <title>ParkVision — Condomínio</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a3a5c;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header img { width: 80px; height: 80px; }
        .header h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-top: 10px;
        }
        .header h1 span { color: #00c2e0; }
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 4px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .card h2 {
            font-size: 16px;
            color: #1a3a5c;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cond-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1.5px solid #e9ecef;
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }
        .cond-item:active {
            background: #f0fafd;
            border-color: #00c2e0;
        }
        .cond-icon {
            width: 44px;
            height: 44px;
            background: #1a3a5c;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
        }
        .cond-icon svg { width: 22px; height: 22px; fill: #00c2e0; }
        .cond-nome {
            font-size: 16px;
            font-weight: 600;
            color: #1a3a5c;
        }
        .cond-arrow {
            margin-left: auto;
            color: #adb5bd;
            font-size: 20px;
        }

        .btn-sair {
            display: block;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-top: 24px;
            text-decoration: none;
        }
        .btn-sair:active { color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/icons/icon-square.svg" alt="ParkVision">
        <h1>Park<span>Vision</span></h1>
        <p>Olá, {{ usuario.nome_curto }}</p>
    </div>

    <div class="card">
        <h2>Selecione o Condomínio</h2>
        {% for cond in condominios %}
        <a class="cond-item" href="/app/selecionar/{{ cond.idcond }}">
            <div class="cond-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
            </div>
            <span class="cond-nome">{{ cond.nmcond }}</span>
            <span class="cond-arrow">›</span>
        </a>
        {% else %}
        <p style="text-align:center;color:#888;font-size:14px;">Nenhum condomínio disponível.</p>
        {% endfor %}
    </div>

    <a href="/app/logout" class="btn-sair">Sair</a>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
